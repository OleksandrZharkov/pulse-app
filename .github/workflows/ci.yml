name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Проверка секретов в коде
      - name: Gitleaks Scan
        uses: zricethezav/gitleaks-action@v2

      # 2. Установка Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Сборка и сканирование Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pulse-backend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/pulse-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pulse-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pulse-backend:buildcache,mode=max

      - name: Run Trivy scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/pulse-backend:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          scanners: 'vuln'
          ignore-unfixed: true

      # 4. Сборка и сканирование Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pulse-frontend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/pulse-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pulse-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pulse-frontend:buildcache,mode=max

      - name: Run Trivy scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/pulse-frontend:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          scanners: 'vuln'
          ignore-unfixed: true

      # 5. Проверка K8s манифестов
      - name: Scan Kubernetes manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./k8s
          framework: kubernetes
          soft_fail: true # Пока не блокируем билд, чтобы не мешать разработке