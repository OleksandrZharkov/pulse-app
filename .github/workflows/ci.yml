name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest httpx ruff

      - name: Lint backend
        run: ruff check backend

      - name: Run backend smoke tests
        env:
          SKIP_DB_INIT: "true"
          PYTHONPATH: backend
        run: pytest backend/tests -q

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Snyk
        uses: snyk/actions/setup@v1

      - name: Run Snyk to check for vulnerabilities
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Some transitive Python deps can be unresolved in CI resolver context.
        run: snyk test --file=backend/requirements.txt --package-manager=pip --allow-missing

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/pulse-backend:${{ github.sha }}

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@v0.9.2
        if: github.event_name == 'push'
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/pulse-backend:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Update Helm values
        if: github.event_name == 'push'
        run: |
          # Commit bot-only image tag updates for GitOps-style rollout.
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          VALUES_FILE="k8s-helm/values.yaml"
          
          sed -i "s|image: ozharkov/pulse-backend.*|image: ozharkov/pulse-backend:${{ github.sha }}|g" $VALUES_FILE
          
          git add $VALUES_FILE
          git commit -m "chore: update backend image to ${{ github.sha }}"
          git push