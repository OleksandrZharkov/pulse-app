apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pulse-app
  template:
    metadata:
      labels:
        app: pulse-app
    spec:
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: Always
        env:
          - name: DB_HOST
            value: "postgres-service"
          - name: DB_USER
            value: {{ .Values.database.user }}
          - name: DB_PASSWORD
            value: {{ .Values.database.password }}
          - name: DB_NAME
            value: {{ .Values.database.name }}
        ports:
        - containerPort: {{ .Values.backend.port }}
      - name: frontend
        image: {{ .Values.frontend.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.frontend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-app-service
  labels:           # Метки для обнаружения Prometheus
    app: pulse-app  
spec:
  ports:
  - name: http-frontend
    port: 80
    targetPort: 80
  - name: http-backend
    port: 8000
    targetPort: 8000
  selector:
    app: pulse-app