replicaCount: 1

backend:
  image: ozharkov/pulse-backend:eedf598bd4915e0bf4e642c04c8c9116112add53
  port: 8000

frontend:
  image: ozharkov/pulse-frontend
  port: 80

database:
  user: "admin"
  existingSecretName: "pulse-db-secret"
  passwordKey: "password"
  name: "pulsedb"
  storageSize: 1Gi

prometheus:
  enabled: true
  image: prom/prometheus:v2.53.1
  port: 9090
  retention: 7d
  storageSize: 2Gi